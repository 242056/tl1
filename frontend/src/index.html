<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ВТБ — Инвестиционный ассистент</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <style>
      :root {
        --vtb-navy: #002d62;
        --vtb-blue: #0070ba;
        --vtb-cyan: #00a0e3;
        --vtb-bg: #eef2f6;
        --vtb-card: #ffffff;
        --vtb-ink: #1a2332;
        --vtb-muted: #5c6b7a;
        --vtb-line: #d8e2ec;
        --vtb-bot: #f0f5fa;
        --vtb-user: linear-gradient(135deg, #0070ba 0%, #00a0e3 100%);
        --danger: #c62828;
        --ok: #2e7d32;
      }
      * { box-sizing: border-box; }
      html, body {
        height: 100%;
        overflow: hidden;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        background: var(--vtb-bg);
        color: var(--vtb-ink);
      }
      .app {
        max-width: 820px;
        margin: 0 auto;
        height: 100%;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition: max-width 0.25s ease;
      }
      .app.copilot-open {
        max-width: 1240px;
      }
      .header {
        flex-shrink: 0;
        background: var(--vtb-navy);
        color: #fff;
        padding: 14px 20px;
        display: flex;
        align-items: center;
        gap: 14px;
        box-shadow: 0 4px 20px rgba(0, 45, 98, 0.25);
      }
      .logo {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        background: linear-gradient(145deg, #fff 0%, #e8f4fc 100%);
        display: grid;
        place-items: center;
        font-weight: 800;
        font-size: 13px;
        color: var(--vtb-navy);
        letter-spacing: -0.5px;
      }
      .header-text h1 {
        margin: 0;
        font-size: 17px;
        font-weight: 600;
      }
      .header-text p {
        margin: 2px 0 0;
        font-size: 12px;
        opacity: 0.85;
      }
      .main {
        flex: 1;
        min-height: 0;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        overflow: hidden;
      }
      .workspace {
        flex: 1;
        min-height: 0;
        display: flex;
        gap: 12px;
        overflow: hidden;
      }
      .chat-panel {
        flex: 1;
        min-width: 0;
        min-height: 0;
        background: var(--vtb-card);
        border-radius: 16px;
        border: 1px solid var(--vtb-line);
        box-shadow: 0 8px 32px rgba(0, 45, 98, 0.08);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .chat-log {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        overscroll-behavior: contain;
        scroll-behavior: smooth;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: linear-gradient(180deg, #fafcfe 0%, #fff 100%);
      }
      .msg {
        max-width: 88%;
        border-radius: 16px;
        padding: 10px 14px;
        line-height: 1.45;
        font-size: 14px;
      }
      .msg.user {
        align-self: flex-end;
        background: var(--vtb-user);
        color: #fff;
        white-space: pre-wrap;
        border-bottom-right-radius: 4px;
        scroll-margin-top: 12px;
      }
      .msg.bot {
        align-self: flex-start;
        background: var(--vtb-bot);
        color: var(--vtb-ink);
        border: 1px solid var(--vtb-line);
        border-bottom-left-radius: 4px;
      }
      .msg-badge {
        display: inline-block;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        padding: 2px 8px;
        border-radius: 999px;
        margin-bottom: 6px;
      }
      .badge-dialog { background: #e3eef8; color: #004080; }
      .badge-passport { background: #e0f4fa; color: #006994; }
      .badge-copilot { background: #ede7f6; color: #4527a0; }
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }
      .chip {
        border: 1px solid #c5d9ea;
        background: #fff;
        color: #004080;
        padding: 7px 14px;
        border-radius: 999px;
        font-size: 12px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }
      .chip:hover {
        background: #e8f2fa;
        border-color: var(--vtb-blue);
      }
      .section {
        margin-top: 10px;
        padding-top: 8px;
        border-top: 1px solid var(--vtb-line);
        font-size: 13px;
      }
      .section strong { display: block; margin-bottom: 4px; font-size: 12px; color: var(--vtb-muted); text-transform: uppercase; letter-spacing: 0.03em; }
      .section ul { margin: 4px 0 0; padding-left: 18px; }
      .passport-card {
        margin-top: 10px;
        background: #fff;
        border: 1px solid var(--vtb-line);
        border-radius: 12px;
        padding: 12px;
      }
      .passport-title {
        font-weight: 600;
        font-size: 15px;
        color: var(--vtb-navy);
        margin-bottom: 4px;
      }
      .passport-meta { font-size: 11px; color: var(--vtb-muted); margin-bottom: 10px; }
      .metrics-grid {
        display: grid;
        gap: 6px;
        margin-top: 8px;
      }
      .metric-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-size: 13px;
        padding: 6px 8px;
        background: #f6f9fc;
        border-radius: 8px;
      }
      .metric-row span:first-child { color: var(--vtb-muted); }
      .metric-row span:last-child { font-weight: 500; text-align: right; }
      .factors-cols {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 8px;
      }
      @media (max-width: 600px) { .factors-cols { grid-template-columns: 1fr; } }
      .factor-col h4 {
        margin: 0 0 6px;
        font-size: 11px;
        text-transform: uppercase;
        color: var(--vtb-muted);
      }
      .factor-col.pos h4 { color: var(--ok); }
      .factor-col.neg h4 { color: var(--danger); }
      .factor-col ul { margin: 0; padding-left: 16px; font-size: 12px; }
      .sources a { color: var(--vtb-blue); text-decoration: none; font-size: 12px; }
      .sources li { margin-bottom: 4px; }
      .pill { font-size: 10px; padding: 2px 6px; border-radius: 999px; background: #e8f4fa; color: #006994; margin-right: 4px; }
      .disc { font-size: 11px; color: var(--vtb-muted); margin-top: 10px; line-height: 1.4; }
      .chart-bubble {
        align-self: stretch;
        width: 100%;
        background: #f6f9fc;
        border: 1px solid var(--vtb-line);
        border-radius: 12px;
        padding: 12px;
        margin-top: 6px;
      }
      .chart-bubble canvas { width: 100% !important; height: 180px !important; }
      .chart-title { font-size: 12px; font-weight: 600; margin-bottom: 8px; color: var(--vtb-navy); }
      .impact-wrap { background: #fff; border: 1px solid var(--vtb-line); border-radius: 8px; padding: 8px; margin-top: 8px; }
      .impact-track { position: relative; height: 10px; border-radius: 999px; background: linear-gradient(90deg, #f3b4ba, #f6f8fb 50%, #bde9ca); }
      .impact-marker { position: absolute; top: -3px; width: 2px; height: 16px; background: var(--vtb-navy); }
      .compose {
        flex-shrink: 0;
        border-top: 1px solid var(--vtb-line);
        padding: 12px 16px;
        background: #fff;
        display: grid;
        gap: 10px;
      }
      .compose-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: end;
      }
      textarea {
        resize: none;
        border: 1px solid var(--vtb-line);
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 14px;
        font-family: inherit;
        min-height: 48px;
      }
      textarea:focus { outline: 2px solid rgba(0, 112, 186, 0.25); border-color: var(--vtb-blue); }
      .send-btn {
        border: none;
        border-radius: 12px;
        padding: 12px 20px;
        background: var(--vtb-user);
        color: #fff;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        min-width: 110px;
      }
      .send-btn:disabled { opacity: 0.6; cursor: not-allowed; }
      .typing {
        align-self: flex-start;
        padding: 10px 14px;
        background: var(--vtb-bot);
        border: 1px solid var(--vtb-line);
        border-radius: 16px;
        border-bottom-left-radius: 4px;
      }
      .typing-dots {
        display: flex;
        align-items: center;
        gap: 5px;
        min-width: 36px;
        min-height: 14px;
      }
      .typing-dots span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--vtb-muted);
        animation: typingDot 1.2s infinite ease-in-out;
      }
      .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
      .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
      @keyframes typingDot {
        0%, 80%, 100% { opacity: 0.35; transform: translateY(0); }
        40% { opacity: 1; transform: translateY(-4px); }
      }
      .footer-note {
        flex-shrink: 0;
        text-align: center;
        font-size: 11px;
        color: var(--vtb-muted);
        padding: 0 8px 4px;
      }
      .danger { color: var(--danger); }
      .toast-box { position: fixed; top: 16px; right: 16px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
      .toast { background: var(--vtb-navy); color: #fff; padding: 10px 14px; border-radius: 10px; font-size: 13px; opacity: 0; transform: translateY(-8px); transition: 0.2s; }
      .toast.show { opacity: 1; transform: translateY(0); }

      /* Co-pilot panel — колонка справа от чата */
      .copilot-panel {
        width: 0;
        min-width: 0;
        overflow: hidden;
        opacity: 0;
        background: #fff;
        border-radius: 16px;
        border: 1px solid var(--vtb-line);
        box-shadow: 0 8px 32px rgba(69, 39, 160, 0.1);
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
        transition: width 0.25s ease, opacity 0.2s ease, min-width 0.25s ease;
      }
      .app.copilot-open .copilot-panel {
        width: min(400px, 38vw);
        min-width: 320px;
        opacity: 1;
      }
      .copilot-head {
        flex-shrink: 0;
        background: linear-gradient(135deg, #4527a0 0%, #6a1b9a 100%);
        color: #fff;
        padding: 16px 18px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }
      .copilot-head h2 { margin: 0; font-size: 17px; font-weight: 600; }
      .copilot-head p { margin: 4px 0 0; font-size: 12px; opacity: 0.9; }
      .copilot-close {
        border: none;
        background: rgba(255,255,255,0.2);
        color: #fff;
        width: 32px;
        height: 32px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 18px;
        line-height: 1;
      }
      .copilot-body {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 14px 16px 20px;
      }
      .copilot-metrics {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 14px;
      }
      .copilot-metric {
        background: #f6f4fb;
        border: 1px solid #e8e0f5;
        border-radius: 10px;
        padding: 10px;
      }
      .copilot-metric .label { font-size: 10px; text-transform: uppercase; color: var(--vtb-muted); letter-spacing: 0.04em; }
      .copilot-metric .value { font-size: 18px; font-weight: 600; margin-top: 2px; }
      .copilot-metric .delta { font-size: 11px; margin-top: 2px; }
      .delta-good { color: var(--ok); }
      .delta-bad { color: var(--danger); }
      .delta-neutral { color: var(--vtb-muted); }
      .delta-warn { color: #f57c00; }
      .copilot-warnings {
        margin-bottom: 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .copilot-warn {
        font-size: 12px;
        padding: 8px 10px;
        border-radius: 8px;
        border-left: 3px solid;
      }
      .copilot-warn.yellow { background: #fff8e1; border-color: #f9a825; color: #6d4c00; }
      .copilot-warn.red { background: #ffebee; border-color: #c62828; color: #7f0000; }
      .asset-slider-row {
        background: #fafcfe;
        border: 1px solid var(--vtb-line);
        border-radius: 12px;
        padding: 10px 12px;
        margin-bottom: 8px;
      }
      .asset-slider-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 8px;
        margin-bottom: 6px;
      }
      .asset-slider-top .name { font-size: 13px; font-weight: 500; flex: 1; }
      .asset-slider-top .pct { font-size: 14px; font-weight: 600; color: var(--vtb-navy); min-width: 42px; text-align: right; }
      .asset-slider-delta { font-size: 11px; color: var(--vtb-muted); }
      .asset-slider-amount { font-size: 12px; font-weight: 600; color: var(--vtb-navy); margin-top: 2px; }
      .asset-slider-amount-delta { font-size: 11px; margin-left: 6px; font-weight: 500; }
      .asset-slider-row input[type=range] { width: 100%; accent-color: #6a1b9a; }
      .copilot-actions-bar {
        flex-shrink: 0;
        border-top: 1px solid var(--vtb-line);
        padding: 12px 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        background: #fff;
      }
      .copilot-btn {
        border: 1px solid #c5b3e6;
        background: #fff;
        color: #4527a0;
        padding: 8px 14px;
        border-radius: 999px;
        font-size: 12px;
        cursor: pointer;
      }
      .copilot-btn.primary {
        background: linear-gradient(135deg, #4527a0 0%, #6a1b9a 100%);
        color: #fff;
        border: none;
        font-weight: 600;
      }
      .copilot-btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .copilot-confirmed-banner {
        display: none;
        margin-bottom: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        background: #e8f5e9;
        border: 1px solid #a5d6a7;
        color: #1b5e20;
        font-size: 13px;
        line-height: 1.4;
      }
      .copilot-panel.is-confirmed .copilot-confirmed-banner { display: block; }
      .copilot-panel.is-confirmed input[type=range] { pointer-events: none; opacity: 0.55; }
      .copilot-panel.is-confirmed .copilot-scenario-select { pointer-events: none; opacity: 0.65; }
      .copilot-scenario-select {
        width: 100%;
        border: 1px solid var(--vtb-line);
        border-radius: 10px;
        padding: 8px 10px;
        font-size: 13px;
        margin-bottom: 12px;
      }
      .confirm-modal {
        position: fixed;
        inset: 0;
        z-index: 600;
        background: rgba(0,0,0,0.5);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }
      .confirm-modal.open { display: flex; }
      .confirm-box {
        background: #fff;
        border-radius: 16px;
        max-width: 420px;
        width: 100%;
        padding: 20px;
        max-height: 90vh;
        overflow-y: auto;
      }
      .confirm-box h3 { margin: 0 0 12px; color: var(--vtb-navy); }
      .header-copilot-btn {
        margin-left: auto;
        border: 1px solid rgba(255,255,255,0.35);
        background: rgba(255,255,255,0.12);
        color: #fff;
        padding: 8px 14px;
        border-radius: 999px;
        font-size: 12px;
        cursor: pointer;
        white-space: nowrap;
      }
      .header-copilot-btn:hover { background: rgba(255,255,255,0.22); }
      @media (max-width: 900px) {
        .app.copilot-open { max-width: 100%; }
        .app.copilot-open .copilot-panel {
          width: min(340px, 42vw);
          min-width: 280px;
        }
      }
    </style>
  </head>
  <body>
    <div id="toastBox" class="toast-box"></div>
    <div class="app">
      <header class="header">
        <div class="logo">ВТБ</div>
        <div class="header-text">
          <h1>Инвестиционный ассистент</h1>
          <p>Бэктест · Сценарии · Анти-Гугл · ИИ-черновик</p>
        </div>
        <button type="button" id="openCopilotBtn" class="header-copilot-btn">ИИ-черновик</button>
      </header>

      <main class="main">
        <div class="workspace">
          <div class="chat-panel">
            <div id="chatLog" class="chat-log"></div>
            <div class="compose">
              <div class="compose-row">
                <textarea id="chatInput" rows="2" placeholder="Например: бэктест за 3 года или паспорт БПИФ «Ликвидность»"></textarea>
                <button id="chatSend" class="send-btn" type="button">Отправить</button>
              </div>
            </div>
          </div>
          <aside id="copilotPanel" class="copilot-panel" aria-hidden="true" aria-label="ИИ-черновик Co-pilot">
            <div class="copilot-head">
              <div>
                <h2 id="copilotTitle">ИИ-черновик</h2>
                <p id="copilotSubtitle">Интерактивный Co-pilot</p>
              </div>
              <button type="button" class="copilot-close" id="copilotClose" aria-label="Закрыть">×</button>
            </div>
            <div class="copilot-body" id="copilotBody">
              <div id="copilotConfirmedBanner" class="copilot-confirmed-banner">
                Портфель подтверждён. Итоговые доли и метрики зафиксированы.
              </div>
              <select id="copilotScenarioSelect" class="copilot-scenario-select"></select>
              <div id="copilotMetrics" class="copilot-metrics"></div>
              <div id="copilotWarnings" class="copilot-warnings"></div>
              <div id="copilotSliders"></div>
            </div>
            <div class="copilot-actions-bar">
              <button type="button" class="copilot-btn" id="copilotReset">Сбросить</button>
              <button type="button" class="copilot-btn" id="copilotPresetLessRisk">Снизить риск</button>
              <button type="button" class="copilot-btn" id="copilotPresetReturn">↑ Доходность</button>
              <button type="button" class="copilot-btn primary" id="copilotBuyBtn">Купить</button>
            </div>
          </aside>
        </div>
        <p class="footer-note">Информация носит справочный характер и не является индивидуальной инвестиционной рекомендацией.</p>
      </main>
    </div>

    <input type="hidden" id="sessionId" value="" />

    <div id="confirmModal" class="confirm-modal" aria-hidden="true">
      <div class="confirm-box">
        <h3>Подтверждение покупки</h3>
        <div id="confirmContent"></div>
        <p class="disc" id="confirmDisclaimer"></p>
        <div style="display:flex;gap:10px;margin-top:16px">
          <button type="button" class="copilot-btn primary" id="confirmYes">Подтверждаю</button>
          <button type="button" class="copilot-btn" id="confirmNo">Отмена</button>
        </div>
      </div>
    </div>

    <script>
      (function initSession() {
        const el = document.getElementById("sessionId");
        if (!el) return;
        try {
          el.value = typeof crypto !== "undefined" && crypto.randomUUID
            ? "session-" + crypto.randomUUID()
            : "session-" + Date.now() + "-" + Math.random().toString(36).slice(2, 10);
        } catch (_e) {
          el.value = "session-" + Date.now();
        }
      })();

      const chatLog = document.getElementById("chatLog");
      const chatInput = document.getElementById("chatInput");
      const chatSend = document.getElementById("chatSend");
      const toastBox = document.getElementById("toastBox");

      function escHtml(s) {
        return String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      }

      function stripCitationMarkers(s) {
        return String(s ?? "").replace(/\[\s*\d+(?:\s*[,;]\s*\d+)*\s*\]/g, "").replace(/[ \t]{2,}/g, " ").trim();
      }

      function fmtPct(v) {
        if (v === null || v === undefined) return "—";
        if (typeof v === "string" && v.includes("%")) return escHtml(stripCitationMarkers(v));
        const n = Number(v);
        if (Number.isNaN(n)) return escHtml(String(v));
        const pct = n > 1 && n <= 100 ? n / 100 : n;
        return `${(pct * 100).toFixed(1)}%`;
      }

      function formatMetricValue(v, key) {
        if (v === null || v === undefined) return "—";
        if (typeof v === "string") {
          v = stripCitationMarkers(v);
          if (!v || ["нет данных", "n/a", "-", "null"].includes(v.toLowerCase())) return "—";
          if (/%|₽|млрд|млн|лет|год/i.test(v)) return escHtml(v);
          const num = parseFloat(v.replace(",", ".").replace("%", ""));
          if (!Number.isNaN(num) && key && /return|yield|fee|rate|ter|spread|discount|change|coef|deduction|dividend|buyback|income|guarantee|1y/i.test(key)) {
            return fmtPct(v.includes("%") || num > 1 ? num / 100 : num);
          }
          return escHtml(v);
        }
        if (typeof v === "number" && key && /return|yield|fee|rate|ter|spread|discount|change|coef|deduction|dividend|buyback|income|guarantee|1y/i.test(key)) {
          return fmtPct(v > 1 && v <= 100 ? v / 100 : v);
        }
        return escHtml(String(v));
      }

      function renderChips(actions, intent) {
        if (intent === "COPILOT" || !actions?.length) return "";
        return `<div class="chips">${actions.map((a) => `<button type="button" class="chip" data-action="${escHtml(a)}">${escHtml(a)}</button>`).join("")}</div>`;
      }

      let lastUserMessageEl = null;

      function scrollToLastUserMessage(smooth = true) {
        if (!lastUserMessageEl) return;
        requestAnimationFrame(() => {
          lastUserMessageEl.scrollIntoView({

      function badgeForIntent(intent) {

      function isAllowedPassportSource(src) {
        const url = typeof src === "string" ? src : (src?.url || "");
        if (!url) return false;
        try {
          const u = new URL(url);
          if (u.hostname === "www.moex.com") {
            return /^\/ru\/issue\.aspx\?code=[A-Za-z0-9]+$/.test(u.pathname + u.search);
          }
          if (u.hostname === "ru.investing.com") {
            return /^\/(etfs|commodities|funds)\/[a-z0-9-]+$/.test(u.pathname);
          }
          if (u.hostname === "www.cbr.ru") {
            return /^\/hd_base\/metall\/?$/.test(u.pathname);
          }
          if (u.hostname === "www.vtb.ru") {
            return /^\/personal\/[a-z0-9\-_/]+\/?$/i.test(u.pathname);
          }
          if (u.hostname === "private.vtb.ru") {
            return /^\/[a-z0-9\-_/]+\/?$/i.test(u.pathname);
          }
          if (u.hostname === "www.wealthim.ru") {
            return u.pathname === "/" || /^\/products\/pif\/(opif|zpif)\/[a-z0-9_-]+\/?$/i.test(u.pathname);
          }
          return false;
        } catch {
          return false;
        }
      }

            <div class="metrics-grid">${metricRows}</div>

      /* ── Co-pilot ── */
      const appEl = document.querySelector(".app");
      const copilotPanel = document.getElementById("copilotPanel");
      const copilotSliders = document.getElementById("copilotSliders");
      const copilotMetrics = document.getElementById("copilotMetrics");
      const copilotWarnings = document.getElementById("copilotWarnings");
      const copilotTitle = document.getElementById("copilotTitle");
      const copilotSubtitle = document.getElementById("copilotSubtitle");
      const copilotScenarioSelect = document.getElementById("copilotScenarioSelect");
      let copilotState = { products: [], metrics: null, metric_deltas: {}, warnings: [], scenario: null, placementAmount: 0 };
      let copilotRecalcTimer = null;
      let copilotBusy = false;

      function sessionId() {
        return document.getElementById("sessionId").value;
      }

      async function copilotFetch(path, body) {
        const res = await fetch(path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sessionId: sessionId(), ...body }),
        });
        return res.json();
      }

      function pctWeight(w) {
        return `${Math.round(Number(w) * 100)}%`;
      }

      function formatRub(n) {
        const v = Number(n);
        if (Number.isNaN(v)) return "—";
        return new Intl.NumberFormat("ru-RU", {
          style: "currency",
          currency: "RUB",
          maximumFractionDigits: 0,
        }).format(v);
      }

      function formatAmountDelta(delta) {
        const d = Number(delta || 0);
        if (Math.abs(d) < 500) return "";
        const sign = d > 0 ? "+" : "−";
        return `<span class="asset-slider-amount-delta">${sign}${formatRub(Math.abs(d))}</span>`;
      }

      function redistributeWeights(products, changedIdx, newWeight) {
        const w = Math.max(0, Math.min(1, newWeight));
        const out = products.map((p) => ({ ...p, weight: Number(p.weight || 0) }));
        out[changedIdx].weight = w;
        const others = out.filter((_, i) => i !== changedIdx);
        const rest = Math.max(0, 1 - w);
        const othersSum = others.reduce((a, p) => a + p.weight, 0);
        if (others.length === 0) return out;
        if (othersSum <= 0) {
          const even = rest / others.length;
          others.forEach((p) => { p.weight = even; });
        } else {
          others.forEach((p) => { p.weight = p.weight * (rest / othersSum); });
        }
        let i = 0;
        return out.map((p, idx) => (idx === changedIdx ? p : { ...p, weight: others[i++].weight }));
      }

      function syncSliderRow(row, product, idx) {
        const pct = Math.round(product.weight * 100);
        row.querySelector('input[type="range"]').value = pct;
        row.querySelector(".pct").textContent = `${pct}%`;
        const amtEl = row.querySelector(".asset-slider-amount");
        if (amtEl) {
          const origAmt = product.original_amount ?? product.amount;
          const delta = (product.amount ?? 0) - origAmt;
          amtEl.innerHTML = `${formatRub(product.amount)}${formatAmountDelta(delta)}`;
        }
      }

      function updateLocalAmounts() {
        const placement = Number(copilotState.placementAmount) || 0;
        if (!placement) return;
        copilotState.products.forEach((p, idx) => {
          p.amount = Math.round(placement * Number(p.weight || 0));
          const row = copilotSliders.querySelector(`.asset-slider-row[data-idx="${idx}"]`);
          if (row) syncSliderRow(row, p, idx);
        });
      }

      function fmtMetricDelta(key, deltaObj) {
        if (!deltaObj) return "";
        const d = Number(deltaObj.delta || 0);
        if (Math.abs(d) < 0.001) return `<span class="delta-neutral">без изменений</span>`;
        const cls = deltaObj.sentiment === "good" ? "delta-good" : (deltaObj.sentiment === "bad" ? "delta-bad" : "delta-neutral");
        const sign = d > 0 ? "+" : "";
        if (key === "expected_return" || key === "volatility") {
          return `<span class="${cls}">${sign}${(d * 100).toFixed(1)} п.п.</span>`;
        }
        return `<span class="${cls}">${sign}${d.toFixed(2)}</span>`;
      }

      function renderCopilotMetrics(metrics, deltas) {
        if (!metrics) { copilotMetrics.innerHTML = ""; return; }
        const rows = [
          ["expected_return", "Доходность", (v) => `${(Number(v) * 100).toFixed(1)}%`],
          ["volatility", "Волатильность", (v) => `${(Number(v) * 100).toFixed(1)}%`],
          ["sharpe_ratio", "Sharpe", (v) => String(v)],
          ["risk_score", "Риск", (v) => String(v)],
        ];
        copilotMetrics.innerHTML = rows.map(([k, label, fmt]) =>
          `<div class="copilot-metric">
            <div class="label">${escHtml(label)}</div>
            <div class="value">${escHtml(fmt(metrics[k]))}</div>
            <div class="delta">${fmtMetricDelta(k, deltas?.[k])}</div>
          </div>`
        ).join("");
      }

      function renderCopilotWarnings(warnings) {
        if (!warnings?.length) { copilotWarnings.innerHTML = ""; return; }
        copilotWarnings.innerHTML = warnings.map((w) =>
          `<div class="copilot-warn ${escHtml(w.level || "yellow")}">${escHtml(w.message)}</div>`
        ).join("");
      }

      function renderCopilotSliders(products) {
        copilotState.products = products.map((p) => ({ ...p }));

        copilotSliders.innerHTML = copilotState.products.map((p, idx) => {
          const w = Number(p.weight || 0);
          const delta = Number(p.weight_delta || 0);
          const deltaTxt = Math.abs(delta) < 0.001 ? "" : ` (${delta > 0 ? "+" : ""}${Math.round(delta * 100)}% к модели)`;
          return `
            <div class="asset-slider-row" data-idx="${idx}">
              <div class="asset-slider-top">
                <div>
                  <div class="name">${escHtml(p.productName)}</div>
                  <div class="asset-slider-delta">Модель: ${pctWeight(p.original_weight ?? p.weight)}${escHtml(deltaTxt)}</div>
                  <div class="asset-slider-amount">${formatRub(p.amount)}${formatAmountDelta(p.amount_delta)}</div>
                </div>
                <span class="pct">${Math.round(w * 100)}%</span>
              </div>
              <input type="range" min="0" max="100" step="1" value="${Math.round(w * 100)}" data-idx="${idx}" />
            </div>`;
        }).join("");

        copilotSliders.querySelectorAll('input[type="range"]').forEach((el) => {
          el.addEventListener("input", (e) => {
            const i = Number(e.target.dataset.idx);
            const val = Number(e.target.value) / 100;
            copilotState.products = redistributeWeights(copilotState.products, i, val);
            copilotState.products.forEach((p, idx) => {
              const row = copilotSliders.querySelector(`.asset-slider-row[data-idx="${idx}"]`);
              if (row) syncSliderRow(row, p, idx);
            });
            updateLocalAmounts();
            scheduleCopilotRecalc();
          });
        });
      }

      function scheduleCopilotRecalc() {
        clearTimeout(copilotRecalcTimer);
        copilotRecalcTimer = setTimeout(() => copilotRecalculate(), 350);
      }

      async function copilotRecalculate() {
        if (copilotBusy) return;
        const weights = copilotState.products.map((p) => ({ productId: p.productId, weight: Number(p.weight) }));

        copilotBusy = true;
        try {
          const data = await copilotFetch("/api/copilot/recalculate", { weights });
          if (!data.success) {
            if (data.error_code !== "rate_limit") {
              showToast(data.message || "Не удалось пересчитать");
            }
            return;
          }
          copilotState.metrics = data.metrics;
          copilotState.metric_deltas = data.metric_deltas || {};
          copilotState.warnings = data.warnings || [];
          if (data.products) renderCopilotSliders(data.products);
          renderCopilotMetrics(data.metrics, data.metric_deltas);
          renderCopilotWarnings(data.warnings);
        } catch (_e) {
          showToast("Не удалось пересчитать портфель");
        } finally {
          copilotBusy = false;
        }
      }

      async function loadCopilotScenarios() {
        try {
          const res = await fetch("/api/copilot/scenarios");
          const json = await res.json();
          const list = json.data || [];
          copilotScenarioSelect.innerHTML = list.map((s) =>
            `<option value="${escHtml(s.id)}">${escHtml(s.title)} (${escHtml(s.risk_profile)})</option>`
          ).join("");
        } catch (_e) {
          copilotScenarioSelect.innerHTML = `<option value="">Сценарии недоступны</option>`;
        }
      }

      function openCopilotPanel() {
        appEl.classList.add("copilot-open");
        copilotPanel.setAttribute("aria-hidden", "false");
      }

      function closeCopilotPanel() {
        appEl.classList.remove("copilot-open");
        copilotPanel.setAttribute("aria-hidden", "true");
      }

      async function openCopilot(scenarioId) {
        openCopilotPanel();
        try {
          const data = await copilotFetch("/api/copilot/init", { scenarioId: scenarioId || copilotScenarioSelect.value || undefined });
          if (!data.success) {
            showToast(data.message || "Не удалось открыть черновик");
            return;
          }
          applyCopilotData(data);
        } catch (_e) {
          showToast("Co-pilot недоступен");
        }
      }

      function setCopilotConfirmed(confirmed) {
        copilotPanel.classList.toggle("is-confirmed", !!confirmed);
        copilotState.confirmed = !!confirmed;
        const buyBtn = document.getElementById("copilotBuyBtn");
        buyBtn.disabled = !!confirmed;
        buyBtn.textContent = confirmed ? "Оформлено" : "Купить";
        document.getElementById("copilotPresetLessRisk").disabled = !!confirmed;
        document.getElementById("copilotPresetReturn").disabled = !!confirmed;
        document.getElementById("copilotReset").disabled = !!confirmed;
      }

      function applyCopilotData(data) {
        copilotState.scenario = data.scenario;
        copilotState.metrics = data.metrics;
        copilotState.metric_deltas = data.metric_deltas || {};
        copilotState.warnings = data.warnings || [];
        copilotState.placementAmount = data.draft?.placementAmount || data.placementAmount;
        const products = data.products || data.confirmation?.products;
        if (data.scenario) {
          copilotTitle.textContent = data.scenario.title || "ИИ-черновик";
          const total = copilotState.placementAmount
            ? ` · ${formatRub(copilotState.placementAmount)}`
            : "";
          const status = data.confirmed ? " · Подтверждено" : "";
          copilotSubtitle.textContent = `Профиль: ${data.scenario.risk_profile_label || data.scenario.risk_profile || "—"}${total}${status}`;
          if (copilotScenarioSelect.querySelector(`option[value="${data.scenario.id}"]`)) {
            copilotScenarioSelect.value = data.scenario.id;
          }
        }
        renderCopilotMetrics(data.metrics, data.metric_deltas);
        renderCopilotWarnings(data.warnings);
        if (products) renderCopilotSliders(products);
        setCopilotConfirmed(!!data.confirmed);
      }

      function closeCopilot() {
        closeCopilotPanel();
      }

      async function showConfirmModal() {
        clearTimeout(copilotRecalcTimer);
        await copilotRecalculate();
        const state = await fetch(`/api/copilot/session/${encodeURIComponent(sessionId())}`).then((r) => r.json());
        if (!state.success) { showToast("Сначала откройте черновик"); return; }
        applyCopilotData(state);
        const m = state.metrics || {};
        const items = (state.products || []).map((p) =>
          `<li>${escHtml(p.productName)} — ${pctWeight(p.weight)} · ${formatRub(p.amount)}</li>`
        ).join("");
        const warns = (state.warnings || []).map((w) => `<li class="danger">${escHtml(w.message)}</li>`).join("");
        document.getElementById("confirmContent").innerHTML = `
          <ul style="margin:0;padding-left:18px;font-size:13px">${items}</ul>
          <div class="section"><strong>Итоговые метрики</strong><ul>
            <li>Доходность: ${fmtPct(m.expected_return)}</li>
            <li>Волатильность: ${fmtPct(m.volatility)}</li>
            <li>Sharpe: ${escHtml(String(m.sharpe_ratio ?? "—"))}</li>
            <li>Риск: ${escHtml(String(m.risk_score ?? "—"))}</li>
          </ul></div>
          ${warns ? `<div class="section"><strong>Предупреждения</strong><ul>${warns}</ul></div>` : ""}`;
        document.getElementById("confirmDisclaimer").textContent =
          "Вы самостоятельно изменили рекомендованный ИИ-портфель и подтверждаете инвестиционное решение";
        document.getElementById("confirmModal").classList.add("open");
      }

      function renderBacktestChart(data) {

      function renderScenarioChart(data) {
        const chartId = "sc_" + Date.now();
        const merged = [
          ...(data.top_losers || []).map((x) => ({ name: x.asset_name, value: Number(x.impact_percent) })),
          ...(data.top_winners || []).map((x) => ({ name: x.asset_name, value: Number(x.impact_percent) })),
        ].slice(0, 6);

        const impact = Number(data.total_impact_percent ?? 0);
        const bubble = document.createElement("div");
        bubble.className = "chart-bubble";
        bubble.innerHTML = `
          <div class="chart-title">Влияние по активам</div>

          <div class="impact-wrap">
            <div style="font-size:12px;margin-bottom:6px">Общий эффект: <strong>${impact > 0 ? "+" : ""}${impact.toFixed(1)}%</strong></div>
            <div class="impact-track"><div class="impact-marker" style="left:${Math.max(0, Math.min(100, ((Math.max(-30, Math.min(30, impact)) + 30) / 60) * 100))}%"></div></div>
          </div>`;
        chatLog.appendChild(bubble);
        scrollToLastUserMessage();
        new Chart(document.getElementById(chartId), {
          type: "bar",
          data: {
            labels: merged.map((x) => x.name),

          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } },

        setTimeout(() => scrollToLastUserMessage(false), 120);

        requestAnimationFrame(() => el.classList.add("show"));

      async function sendMessage(text) {
        const message = (text ?? chatInput.value).trim();
        if (!message || chatSend.disabled) return;
        chatInput.value = "";
        pushUser(message);
        chatSend.disabled = true;

        addTyping();

        let data;
        try {
          const res = await fetch("/api/agent", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ sessionId: document.getElementById("sessionId").value, message }),
          });
          if (!res.ok) {
            throw new Error("HTTP " + res.status);
          }
          data = await res.json();
        } catch (_e) {
          removeTyping();
          chatSend.disabled = false;
          pushBot(`${badgeForIntent("")}Не удалось связаться с сервером. Проверьте, что сервер запущен на порту 3000, и обновите страницу.`);
          return;
        }

        removeTyping();
        chatSend.disabled = false;

        if (!data || data.success === false) {
          pushBot(`${badgeForIntent(data?.intent || "")}${escHtml(data?.reply || data?.message || "Не удалось выполнить запрос.")}${renderChips(data?.actions, data?.intent)}`);
          return;
        }

        try {
          const intent = data.intent || "UNKNOWN";
          let body = `${badgeForIntent(intent)}`;
          if (!data.passport) {
            body += escHtml(data.reply || data.message || "Готово.");
          }
          body += renderDialogExtras(data);
          if (data.passport) body += renderPassportCard(data.passport);
          if (!data.open_copilot) body += renderChips(data.actions, intent);
          pushBot(body);

          if (data.data?.dates && data.data?.portfolio_values) renderBacktestChart(data.data);
          if (data.data?.total_impact_percent !== undefined) renderScenarioChart(data.data);
          if (data.open_copilot) {
            applyCopilotData(data);
            openCopilotPanel();
          }
        } catch (_e) {
          pushBot(`${badgeForIntent(data?.intent || "")}${escHtml(data?.reply || data?.message || "Ответ получен, но не удалось отобразить.")}${renderChips(data?.actions, data?.intent)}`);
        }
      }

      chatSend.addEventListener("click", () => sendMessage());
      chatInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      });
      chatLog.addEventListener("click", (e) => {
        const btn = e.target.closest("[data-action]");
        if (btn) sendMessage(btn.getAttribute("data-action"));
      });

      pushBot(`
        ${badgeForIntent("")}
        Здравствуйте! Я инвестиционный ассистент ВТБ. Могу:
        <ul style="margin:8px 0;padding-left:18px;font-size:13px">
          <li><b>Бэктест</b> — проверить историю вашего портфеля</li>
          <li><b>Сценарий</b> — смоделировать ставку, рынок или валюту</li>
          <li><b>Анти-Гугл</b> — математический паспорт любого продукта из линейки ВТБ</li>
          <li><b>ИИ-черновик</b> — вручную скорректировать предложенный портфель</li>
        </ul>
        ${renderChips(["Бэктест", "Сценарий", "ИИ-черновик", "Математический паспорт"])}
      `);
    </script>
  </body>
</html>
