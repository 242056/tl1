<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ВТБ — Инвестиционный ассистент</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <style>
      :root {
        --vtb-navy: #002d62;
        --vtb-blue: #0070ba;
        --vtb-cyan: #00a0e3;
        --vtb-bg: #eef2f6;
        --vtb-card: #ffffff;
        --vtb-ink: #1a2332;
        --vtb-muted: #5c6b7a;
        --vtb-line: #d8e2ec;
        --vtb-bot: #f0f5fa;
        --vtb-user: linear-gradient(135deg, #0070ba 0%, #00a0e3 100%);
        --danger: #c62828;
        --ok: #2e7d32;
      }
      * { box-sizing: border-box; }
      html, body {
        height: 100%;
        overflow: hidden;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        background: var(--vtb-bg);
        color: var(--vtb-ink);
      }
      .app {
        max-width: 820px;
        margin: 0 auto;
        height: 100%;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .header {
        flex-shrink: 0;
        background: var(--vtb-navy);
        color: #fff;
        padding: 14px 20px;
        display: flex;
        align-items: center;
        gap: 14px;
        box-shadow: 0 4px 20px rgba(0, 45, 98, 0.25);
      }
      .logo {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        background: linear-gradient(145deg, #fff 0%, #e8f4fc 100%);
        display: grid;
        place-items: center;
        font-weight: 800;
        font-size: 13px;
        color: var(--vtb-navy);
        letter-spacing: -0.5px;
      }
      .header-text h1 {
        margin: 0;
        font-size: 17px;
        font-weight: 600;
      }
      .header-text p {
        margin: 2px 0 0;
        font-size: 12px;
        opacity: 0.85;
      }
      .main {
        flex: 1;
        min-height: 0;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        overflow: hidden;
      }
      .chat-panel {
        flex: 1;
        min-height: 0;
        background: var(--vtb-card);
        border-radius: 16px;
        border: 1px solid var(--vtb-line);
        box-shadow: 0 8px 32px rgba(0, 45, 98, 0.08);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .chat-log {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        overscroll-behavior: contain;
        scroll-behavior: smooth;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: linear-gradient(180deg, #fafcfe 0%, #fff 100%);
      }
      .msg {
        max-width: 88%;
        border-radius: 16px;
        padding: 10px 14px;
        line-height: 1.45;
        font-size: 14px;
      }
      .msg.user {
        align-self: flex-end;
        background: var(--vtb-user);
        color: #fff;
        white-space: pre-wrap;
        border-bottom-right-radius: 4px;
        scroll-margin-top: 12px;
      }
      .msg.bot {
        align-self: flex-start;
        background: var(--vtb-bot);
        color: var(--vtb-ink);
        border: 1px solid var(--vtb-line);
        border-bottom-left-radius: 4px;
      }
      .msg-badge {
        display: inline-block;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        padding: 2px 8px;
        border-radius: 999px;
        margin-bottom: 6px;
      }
      .badge-dialog { background: #e3eef8; color: #004080; }
      .badge-passport { background: #e0f4fa; color: #006994; }
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }
      .chip {
        border: 1px solid #c5d9ea;
        background: #fff;
        color: #004080;
        padding: 7px 14px;
        border-radius: 999px;
        font-size: 12px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }
      .chip:hover {
        background: #e8f2fa;
        border-color: var(--vtb-blue);
      }
      .section {
        margin-top: 10px;
        padding-top: 8px;
        border-top: 1px solid var(--vtb-line);
        font-size: 13px;
      }
      .section strong { display: block; margin-bottom: 4px; font-size: 12px; color: var(--vtb-muted); text-transform: uppercase; letter-spacing: 0.03em; }
      .section ul { margin: 4px 0 0; padding-left: 18px; }
      .passport-card {
        margin-top: 10px;
        background: #fff;
        border: 1px solid var(--vtb-line);
        border-radius: 12px;
        padding: 12px;
      }
      .passport-title {
        font-weight: 600;
        font-size: 15px;
        color: var(--vtb-navy);
        margin-bottom: 4px;
      }
      .passport-meta { font-size: 11px; color: var(--vtb-muted); margin-bottom: 10px; }
      .metrics-grid {
        display: grid;
        gap: 6px;
        margin-top: 8px;
      }
      .metric-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-size: 13px;
        padding: 6px 8px;
        background: #f6f9fc;
        border-radius: 8px;
      }
      .metric-row span:first-child { color: var(--vtb-muted); }
      .metric-row span:last-child { font-weight: 500; text-align: right; }
      .factors-cols {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 8px;
      }
      @media (max-width: 600px) { .factors-cols { grid-template-columns: 1fr; } }
      .factor-col h4 {
        margin: 0 0 6px;
        font-size: 11px;
        text-transform: uppercase;
        color: var(--vtb-muted);
      }
      .factor-col.pos h4 { color: var(--ok); }
      .factor-col.neg h4 { color: var(--danger); }
      .factor-col ul { margin: 0; padding-left: 16px; font-size: 12px; }
      .sources a { color: var(--vtb-blue); text-decoration: none; font-size: 12px; }
      .sources li { margin-bottom: 4px; }
      .pill { font-size: 10px; padding: 2px 6px; border-radius: 999px; background: #e8f4fa; color: #006994; margin-right: 4px; }
      .disc { font-size: 11px; color: var(--vtb-muted); margin-top: 10px; line-height: 1.4; }
      .chart-bubble {
        align-self: stretch;
        width: 100%;
        background: #f6f9fc;
        border: 1px solid var(--vtb-line);
        border-radius: 12px;
        padding: 12px;
        margin-top: 6px;
      }
      .chart-bubble canvas { width: 100% !important; height: 180px !important; }
      .chart-title { font-size: 12px; font-weight: 600; margin-bottom: 8px; color: var(--vtb-navy); }
      .impact-wrap { background: #fff; border: 1px solid var(--vtb-line); border-radius: 8px; padding: 8px; margin-top: 8px; }
      .impact-track { position: relative; height: 10px; border-radius: 999px; background: linear-gradient(90deg, #f3b4ba, #f6f8fb 50%, #bde9ca); }
      .impact-marker { position: absolute; top: -3px; width: 2px; height: 16px; background: var(--vtb-navy); }
      .compose {
        flex-shrink: 0;
        border-top: 1px solid var(--vtb-line);
        padding: 12px 16px;
        background: #fff;
        display: grid;
        gap: 10px;
      }
      .compose-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: end;
      }
      textarea {
        resize: none;
        border: 1px solid var(--vtb-line);
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 14px;
        font-family: inherit;
        min-height: 48px;
      }
      textarea:focus { outline: 2px solid rgba(0, 112, 186, 0.25); border-color: var(--vtb-blue); }
      .send-btn {
        border: none;
        border-radius: 12px;
        padding: 12px 20px;
        background: var(--vtb-user);
        color: #fff;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        min-width: 110px;
      }
      .send-btn:disabled { opacity: 0.6; cursor: not-allowed; }
      .typing {
        align-self: flex-start;
        padding: 10px 14px;
        background: var(--vtb-bot);
        border: 1px solid var(--vtb-line);
        border-radius: 16px;
        border-bottom-left-radius: 4px;
      }
      .typing-dots {
        display: flex;
        align-items: center;
        gap: 5px;
        min-width: 36px;
        min-height: 14px;
      }
      .typing-dots span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--vtb-muted);
        animation: typingDot 1.2s infinite ease-in-out;
      }
      .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
      .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
      @keyframes typingDot {
        0%, 80%, 100% { opacity: 0.35; transform: translateY(0); }
        40% { opacity: 1; transform: translateY(-4px); }
      }
      .footer-note {
        flex-shrink: 0;
        text-align: center;
        font-size: 11px;
        color: var(--vtb-muted);
        padding: 0 8px 4px;
      }
      .danger { color: var(--danger); }
      .toast-box { position: fixed; top: 16px; right: 16px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
      .toast { background: var(--vtb-navy); color: #fff; padding: 10px 14px; border-radius: 10px; font-size: 13px; opacity: 0; transform: translateY(-8px); transition: 0.2s; }
      .toast.show { opacity: 1; transform: translateY(0); }
    </style>
  </head>
  <body>
    <div id="toastBox" class="toast-box"></div>
    <div class="app">
      <header class="header">
        <div class="logo">ВТБ</div>
        <div class="header-text">
          <h1>Инвестиционный ассистент</h1>
          <p>Бэктест · Сценарии · Математический паспорт продукта</p>
        </div>
      </header>

      <main class="main">
        <div class="chat-panel">
          <div id="chatLog" class="chat-log"></div>
          <div class="compose">
            <div class="compose-row">
              <textarea id="chatInput" rows="2" placeholder="Например: бэктест за 3 года или паспорт БПИФ «Ликвидность»"></textarea>
              <button id="chatSend" class="send-btn" type="button">Отправить</button>
            </div>
          </div>
        </div>
        <p class="footer-note">Информация носит справочный характер и не является индивидуальной инвестиционной рекомендацией.</p>
      </main>
    </div>

    <input type="hidden" id="sessionId" value="" />

    <script>
      (function initSession() {
        const el = document.getElementById("sessionId");
        if (!el) return;
        try {
          el.value = typeof crypto !== "undefined" && crypto.randomUUID
            ? "session-" + crypto.randomUUID()
            : "session-" + Date.now() + "-" + Math.random().toString(36).slice(2, 10);
        } catch (_e) {
          el.value = "session-" + Date.now();
        }
      })();

      const chatLog = document.getElementById("chatLog");
      const chatInput = document.getElementById("chatInput");
      const chatSend = document.getElementById("chatSend");
      const toastBox = document.getElementById("toastBox");

      function escHtml(s) {
        return String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      }

      function stripCitationMarkers(s) {
        return String(s ?? "").replace(/\[\s*\d+(?:\s*[,;]\s*\d+)*\s*\]/g, "").replace(/[ \t]{2,}/g, " ").trim();
      }

      function fmtPct(v) {
        if (v === null || v === undefined) return "—";
        if (typeof v === "string" && v.includes("%")) return escHtml(stripCitationMarkers(v));
        const n = Number(v);
        if (Number.isNaN(n)) return escHtml(String(v));
        const pct = n > 1 && n <= 100 ? n / 100 : n;
        return `${(pct * 100).toFixed(1)}%`;
      }

      function formatMetricValue(v, key) {
        if (v === null || v === undefined) return "—";
        if (typeof v === "string") {
          v = stripCitationMarkers(v);
          if (!v || ["нет данных", "n/a", "-", "null"].includes(v.toLowerCase())) return "—";
          if (/%|₽|млрд|млн|лет|год/i.test(v)) return escHtml(v);
          const num = parseFloat(v.replace(",", ".").replace("%", ""));
          if (!Number.isNaN(num) && key && /return|yield|fee|rate|ter|spread|discount|change|coef|deduction|dividend|buyback|income|guarantee|1y/i.test(key)) {
            return fmtPct(v.includes("%") || num > 1 ? num / 100 : num);
          }
          return escHtml(v);
        }
        if (typeof v === "number" && key && /return|yield|fee|rate|ter|spread|discount|change|coef|deduction|dividend|buyback|income|guarantee|1y/i.test(key)) {
          return fmtPct(v > 1 && v <= 100 ? v / 100 : v);
        }
        return escHtml(String(v));
      }

      function renderChips(actions) {
        if (!actions?.length) return "";
        return `<div class="chips">${actions.map((a) => `<button type="button" class="chip" data-action="${escHtml(a)}">${escHtml(a)}</button>`).join("")}</div>`;
      }

      let lastUserMessageEl = null;

      function scrollToLastUserMessage(smooth = true) {
        if (!lastUserMessageEl) return;
        requestAnimationFrame(() => {
          lastUserMessageEl.scrollIntoView({
            block: "start",
            behavior: smooth ? "smooth" : "auto",
          });
        });
      }

      function pushUser(text) {
        const el = document.createElement("div");
        el.className = "msg user";
        el.textContent = text;
        chatLog.appendChild(el);
        lastUserMessageEl = el;
        scrollToLastUserMessage();
        return el;
      }

      function pushBot(html) {
        const el = document.createElement("div");
        el.className = "msg bot";
        el.innerHTML = html;
        chatLog.appendChild(el);
        scrollToLastUserMessage();
        return el;
      }

      function badgeForIntent(intent) {
        if (intent === "ASSET") return `<span class="msg-badge badge-passport">Анти-Гугл</span>`;
        if (intent === "BACKTEST" || intent === "SCENARIO") return `<span class="msg-badge badge-dialog">Диалог</span>`;
        return "";
      }

      function isAllowedPassportSource(src) {
        const url = typeof src === "string" ? src : (src?.url || "");
        if (!url) return false;
        try {
          const u = new URL(url);
          if (u.hostname === "www.moex.com") {
            return /^\/ru\/issue\.aspx\?code=[A-Za-z0-9]+$/.test(u.pathname + u.search);
          }
          if (u.hostname === "ru.investing.com") {
            return /^\/(etfs|commodities|funds)\/[a-z0-9-]+$/.test(u.pathname);
          }
          if (u.hostname === "www.cbr.ru") {
            return /^\/hd_base\/metall\/?$/.test(u.pathname);
          }
          if (u.hostname === "www.vtb.ru") {
            return /^\/personal\/[a-z0-9\-_/]+\/?$/i.test(u.pathname);
          }
          if (u.hostname === "private.vtb.ru") {
            return /^\/[a-z0-9\-_/]+\/?$/i.test(u.pathname);
          }
          if (u.hostname === "www.wealthim.ru") {
            return u.pathname === "/" || /^\/products\/pif\/(opif|zpif)\/[a-z0-9_-]+\/?$/i.test(u.pathname);
          }
          return false;
        } catch {
          return false;
        }
      }

      function renderPassportSources(sources) {
        const items = (sources || [])
          .filter(isAllowedPassportSource)
          .slice(0, 3)
          .map((src) => {
            const url = src.url || "";
            const title = src.title || url;
            return `<li><a href="${escHtml(url)}" target="_blank" rel="noreferrer">${escHtml(title)}</a></li>`;
          })
          .join("");
        return items ? `<div class="section sources"><strong>Источники</strong><ul>${items}</ul></div>` : "";
      }

      function renderPassportCard(p) {
        if (!p) return "";
        const pos = p.positive_factors || [];
        const neg = p.negative_factors || [];
        const labels = p.key_metrics_labels || {};
        const metrics = p.key_metrics || {};
        const entries = labels ? Object.entries(labels) : Object.entries(metrics);
        const metricRows = entries.map(([k, label]) =>
          `<div class="metric-row"><span>${escHtml(label)}</span><span>${formatMetricValue(metrics[k], k)}</span></div>`
        ).join("");
        const updated = p.updated_at ? new Date(p.updated_at).toLocaleString("ru-RU") : "—";
        return `
          <div class="passport-card">
            <div class="passport-title">${escHtml(p.asset_name || "Продукт")}</div>
            <div class="passport-meta">Обновлено: ${escHtml(updated)}</div>
            <div><strong style="font-size:12px;color:var(--vtb-muted)">Резюме</strong><br/>${escHtml(p.summary || "")}</div>
            <div class="metrics-grid">${metricRows}</div>
            <div class="factors-cols">
              <div class="factor-col pos"><h4>Позитивный фон</h4><ul>${pos.map((f) => `<li>${escHtml(f)}</li>`).join("")}</ul></div>
              <div class="factor-col neg"><h4>Риски</h4><ul>${neg.map((f) => `<li>${escHtml(f)}</li>`).join("")}</ul></div>
            </div>
            ${renderPassportSources(p.sources)}
            <div class="disc">${escHtml(p.disclaimer || "")}</div>
          </div>`;
      }

      function renderDialogExtras(data) {
        let html = "";
        if (data.data?.metrics?.portfolio) {
          const m = data.data.metrics;
          const worst = m.portfolio.worst_drawdown_date ? new Date(m.portfolio.worst_drawdown_date).toLocaleDateString("ru-RU") : "—";
          html += `<div class="section"><strong>Метрики бэктеста</strong><ul>
            <li>Доходность портфеля: ${fmtPct(m.portfolio.annual_return)}</li>
            <li>IMOEX: ${fmtPct(m.benchmark.annual_return)}</li>
            <li>Макс. просадка: ${fmtPct(m.portfolio.max_drawdown)}</li>
            <li>Sharpe: ${escHtml(String(m.portfolio.sharpe_ratio))}</li>
            <li>Пик просадки: ${escHtml(worst)}</li>
          </ul></div>`;
        }
        if (data.data?.total_impact_percent !== undefined) {
          const impact = data.data.total_impact_percent;
          const sign = impact > 0 ? "+" : "";
          html += `<div class="section"><strong>Сценарий</strong><ul>
            <li>Общий эффект: <span class="${impact < 0 ? "danger" : ""}">${sign}${impact}%</span></li>
            <li>${escHtml(data.data.explanation_factors || "")}</li>
          </ul></div>`;
        }
        if (data.portfolio?.products?.length) {
          const items = data.portfolio.products.map((p) =>
            `<li>${escHtml(p.productName)} — ${(Number(p.weight) * 100).toFixed(0)}%</li>`
          ).join("");
          html += `<div class="section"><strong>Состав портфеля</strong><ul>${items}</ul></div>`;
        }
        return html;
      }

      function renderBacktestChart(data) {
        const chartId = "bt_" + Date.now();
        const bubble = document.createElement("div");
        bubble.className = "chart-bubble";
        bubble.innerHTML = `<div class="chart-title">Динамика портфеля vs IMOEX</div><canvas id="${chartId}"></canvas>`;
        chatLog.appendChild(bubble);
        scrollToLastUserMessage();
        const fmt = (d) => new Date(d).toLocaleDateString("ru-RU", { month: "short", year: "2-digit" });
        const labels = (data.dates || []).map(fmt);
        new Chart(document.getElementById(chartId), {
          type: "line",
          data: {
            labels,
            datasets: [
              { label: "Портфель", data: data.portfolio_values, borderColor: "#0070ba", backgroundColor: "rgba(0,112,186,0.08)", fill: true, tension: 0.42, pointRadius: 2 },
              { label: "IMOEX", data: data.benchmark_values, borderColor: "#00a0e3", borderDash: [4, 3], fill: false, tension: 0.42, pointRadius: 2 },
            ],
          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { font: { size: 11 } } } } },
        });
        setTimeout(() => scrollToLastUserMessage(false), 120);
      }

      function renderScenarioChart(data) {
        const chartId = "sc_" + Date.now();
        const merged = [
          ...(data.top_losers || []).map((x) => ({ name: x.asset_name, value: Number(x.impact_percent) })),
          ...(data.top_winners || []).map((x) => ({ name: x.asset_name, value: Number(x.impact_percent) })),
        ].slice(0, 6);
        if (!merged.length) return;
        const impact = Number(data.total_impact_percent ?? 0);
        const bubble = document.createElement("div");
        bubble.className = "chart-bubble";
        bubble.innerHTML = `
          <div class="chart-title">Влияние по активам</div>
          <canvas id="${chartId}"></canvas>
          <div class="impact-wrap">
            <div style="font-size:12px;margin-bottom:6px">Общий эффект: <strong>${impact > 0 ? "+" : ""}${impact.toFixed(1)}%</strong></div>
            <div class="impact-track"><div class="impact-marker" style="left:${Math.max(0, Math.min(100, ((Math.max(-30, Math.min(30, impact)) + 30) / 60) * 100))}%"></div></div>
          </div>`;
        chatLog.appendChild(bubble);
        scrollToLastUserMessage();
        new Chart(document.getElementById(chartId), {
          type: "bar",
          data: {
            labels: merged.map((x) => x.name),
            datasets: [{ data: merged.map((x) => x.value), backgroundColor: merged.map((v) => (v.value < 0 ? "rgba(198,40,40,0.8)" : "rgba(46,125,50,0.8)")) }],
          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } },
        });
        setTimeout(() => scrollToLastUserMessage(false), 120);
      }

      function addTyping() {
        const t = document.createElement("div");
        t.className = "typing";
        t.id = "typingIndicator";
        t.innerHTML = '<span class="typing-dots" aria-label="Загрузка"><span></span><span></span><span></span></span>';
        chatLog.appendChild(t);
        scrollToLastUserMessage();
      }

      function removeTyping() {
        document.getElementById("typingIndicator")?.remove();
      }

      function showToast(text) {
        const el = document.createElement("div");
        el.className = "toast";
        el.textContent = text;
        toastBox.appendChild(el);
        requestAnimationFrame(() => el.classList.add("show"));
        setTimeout(() => { el.classList.remove("show"); setTimeout(() => el.remove(), 200); }, 2600);
      }

      async function sendMessage(text) {
        const message = (text ?? chatInput.value).trim();
        if (!message || chatSend.disabled) return;
        chatInput.value = "";
        pushUser(message);
        chatSend.disabled = true;

        addTyping();

        let data;
        try {
          const res = await fetch("/api/agent", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ sessionId: document.getElementById("sessionId").value, message }),
          });
          if (!res.ok) {
            throw new Error("HTTP " + res.status);
          }
          data = await res.json();
        } catch (_e) {
          removeTyping();
          chatSend.disabled = false;
          pushBot(`${badgeForIntent("")}Не удалось связаться с сервером. Проверьте, что сервер запущен на порту 3000, и обновите страницу.`);
          return;
        }

        removeTyping();
        chatSend.disabled = false;

        if (!data || data.success === false) {
          pushBot(`${badgeForIntent(data?.intent || "")}${escHtml(data?.reply || data?.message || "Не удалось выполнить запрос.")}${renderChips(data?.actions)}`);
          return;
        }

        try {
          const intent = data.intent || "UNKNOWN";
          let body = `${badgeForIntent(intent)}`;
          if (!data.passport) {
            body += escHtml(data.reply || data.message || "Готово.");
          }
          body += renderDialogExtras(data);
          if (data.passport) body += renderPassportCard(data.passport);
          body += renderChips(data.actions);
          pushBot(body);

          if (data.data?.dates && data.data?.portfolio_values) renderBacktestChart(data.data);
          if (data.data?.total_impact_percent !== undefined) renderScenarioChart(data.data);
        } catch (_e) {
          pushBot(`${badgeForIntent(data?.intent || "")}${escHtml(data?.reply || data?.message || "Ответ получен, но не удалось отобразить.")}${renderChips(data?.actions)}`);
        }
      }

      chatSend.addEventListener("click", () => sendMessage());
      chatInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      });
      chatLog.addEventListener("click", (e) => {
        const btn = e.target.closest("[data-action]");
        if (btn) sendMessage(btn.getAttribute("data-action"));
      });

      pushBot(`
        ${badgeForIntent("")}
        Здравствуйте! Я инвестиционный ассистент ВТБ. Могу:
        <ul style="margin:8px 0;padding-left:18px;font-size:13px">
          <li><b>Бэктест</b> — проверить историю вашего портфеля</li>
          <li><b>Сценарий</b> — смоделировать ставку, рынок или валюту</li>
          <li><b>Анти-Гугл</b> — математический паспорт любого продукта из линейки ВТБ</li>
        </ul>
        ${renderChips(["Бэктест", "Сценарий", "Математический паспорт", "Паспорт: Золото.Биржевой"])}
      `);
    </script>
  </body>
</html>
